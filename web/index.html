<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Mahjong Soul Data Viewer - Browse characters, items, skins, voices, stories and more from Mahjong Soul (雀魂).">
    <meta name="keywords" content="Mahjong Soul, 雀魂, 작혼, データ, data, characters, items, skins">
    <meta name="author" content="4n3u">

    <!-- Open Graph -->
    <meta property="og:title" content="Mahjong Soul Data Viewer">
    <meta property="og:description" content="Browse characters, items, skins, voices, and stories from Mahjong Soul.">
    <meta property="og:type" content="website">

    <title>Mahjong Soul Data</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Remix Icon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <!-- Custom CSS -->
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle menu">
        <i class="ri-menu-line"></i>
    </button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="#/" class="sidebar-brand">
                    <span>Mahjong Soul Data</span>
                </a>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <a href="#/characters" class="nav-link" data-route="characters">
                        Characters
                    </a>
                    <a href="#/items" class="nav-link" data-route="items">
                        Items
                    </a>
                    <a href="#/achievements" class="nav-link" data-route="achievements">
                        Achievements
                    </a>
                    <a href="#/activities" class="nav-link" data-route="activities">
                        Activities
                    </a>
                    <a href="#/catchat" class="nav-link" data-route="catchat">
                        CatChat
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="version-info" id="version-info">
                    <span id="game-version">Loading...</span>
                </div>
                <div class="footer-controls">
                    <select id="language-select" class="form-select form-select-sm">
                        <option value="en" selected>English</option>
                        <option value="kr">한국어</option>
                        <option value="jp">日本語</option>
                        <option value="chs">简体中文</option>
                        <option value="chsT">繁體中文</option>
                    </select>
                    <a href="https://github.com/4n3u/MajsoulData" target="_blank" class="github-link" title="GitHub">
                        <i class="ri-github-fill"></i>
                    </a>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" id="app-container">
            <div class="content-loading">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3 text-muted">Loading...</p>
            </div>
        </main>
    </div>

    <!-- Bootstrap Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App Logic -->
    <script type="module" src="app.js"></script>
</body>

</html>
