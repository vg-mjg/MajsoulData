<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mahjong Soul Data</title>
    <meta
      name="description"
      content="Mahjong Soul data explorer."
    />
    <link rel="icon" href="./favicon.ico" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="bg-body-tertiary">
    <div class="container-fluid py-3 app-main-layout">
      <div class="row g-3">
        <aside class="col-12 col-lg-3 col-xxl-2">
          <div class="card border-0 shadow-sm app-sidebar">
            <div class="card-body p-3">
              <a href="#/home" class="app-title h6 mb-3 d-inline-block text-decoration-none">Mahjong Soul Data</a>
              <nav class="list-group list-group-flush nav-list">
                <a href="#/characters" data-route="characters" class="list-group-item list-group-item-action nav-item">Characters</a>
                <a href="#/items" data-route="items" class="list-group-item list-group-item-action nav-item">Items</a>
                <a href="#/achievements" data-route="achievements" class="list-group-item list-group-item-action nav-item">Achievements</a>
                <a href="#/activities" data-route="activities" class="list-group-item list-group-item-action nav-item">Activities</a>
                <a href="#/catchat" data-route="catchat" class="list-group-item list-group-item-action nav-item">CatChat</a>
              </nav>
              <div id="sidebarSearch" class="sidebar-search mt-3">
                <input
                  id="sidebarSearchInput"
                  type="search"
                  class="form-control form-control-sm sidebar-search-input"
                    placeholder="Search characters and items"
                  autocomplete="off"
                  spellcheck="false"
                />
                <div
                  id="sidebarSearchResults"
                  class="sidebar-search-results d-none"
                  role="listbox"
                  aria-label="Search results"
                ></div>
              </div>
              <div class="sidebar-meta d-flex align-items-center pt-2 mt-3 flex-nowrap">
                <select id="languageSelect" class="form-select form-select-sm sidebar-language">
                  <option value="en">English</option>
                  <option value="jp">日本語</option>
                  <option value="chs">简体中文</option>
                  <option value="chs_t">繁體中文</option>
                  <option value="kr">한국어</option>
                </select>
                <div class="sidebar-meta-right d-flex align-items-center gap-2 ms-auto">
                  <span id="gameVersion" class="text-secondary small">-</span>
                  <a
                    href="https://github.com/vg-mjg/MajsoulData"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="github-link text-secondary"
                    aria-label="Open GitHub repository"
                    title="GitHub"
                  >
                    <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" focusable="false">
                      <path
                        fill="currentColor"
                        d="M8 0C3.58 0 0 3.58 0 8a8.01 8.01 0 0 0 5.47 7.59c.4.08.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52 0-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.7 7.7 0 0 1 8 4.93c.68 0 1.36.09 2 .26 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
                      ></path>
                    </svg>
                  </a>
                </div>
              </div>
            </div>
          </div>
        </aside>

        <main class="col-12 col-lg-9 col-xxl-10">
          <div id="viewRoot"></div>
        </main>
      </div>
    </div>
    <footer class="container-fluid pb-3 app-footer">
      <p class="mb-0 text-center text-secondary app-footer-note">All assets are property of Cat Food Studio. Unofficial fan project.</p>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
